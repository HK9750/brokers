services:
  api:
    build: .
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REPORT_QUEUE: report.jobs
      REPORT_PATTERN: report.generate
      REPORT_WORK_MS: 400
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: broker_suite
      POSTGRES_PASSWORD: broker_suite
      POSTGRES_DB: broker_suite
    ports:
      - "3002:3002"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: broker_suite
      POSTGRES_PASSWORD: broker_suite
      POSTGRES_DB: broker_suite
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broker_suite -d broker_suite"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  rabbitmq_data:
  postgres_data:
